# 向量库全局配置
vector:
  # Milvus向量库配置
  milvus:
    database: my_rag
    host: localhost
    port: 19530
    username: root
    password:
    collection: kb_default
    dimension: 1536  # 须与嵌入模型一致（百炼 text-embedding-v4 为 1536）
    timeout-ms: 10000
  # 文本切片配置（完全不变）
  chunk:
    size: 200
    overlap: 20
  # 嵌入：百炼「原生」HTTP（推荐国内）见 api-url；OpenAI 兼容见下方注释。
  # 原生路径：input 为 {"texts":[...]}，与 compatible-mode 的 OpenAI 格式不同。
  embedding:
    model: text-embedding-v4
    api-key: sk-8de44d85eea24ebe99872753b5c4ef44
    api-url: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding
# RAG：向量粗召 →（可选）L2 过滤 → 重排精排 → 上下文拼接
# 向量距离过滤示例：rag.vector.max-l2-distance: 2.0
rag:
  retrieval:
    initial-top-k: 20
  rerank:
    enabled: true
    model: gte-rerank-v2
    api-url: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
    # api-key 留空则复用 vector.embedding.api-key
    min-relevance-score: 0.25
    final-top-k: 5
  prompt:
    max-context-chars: 8000
app:
  admin:
    # 管理接口（封禁/黑名单）请求头 X-Admin-Token，生产环境务必修改
    token: change-me-admin-token
  upload:
    avatar-dir: uploads/avatars
    max-avatar-bytes: 2097152
  chat:
    # 每用户每分钟：发送聊天、文档入库（Redisson 限流）
    rate-per-minute: 30
    document-rate-per-minute: 8
    document-upload-dir: uploads/kb-docs
    document-max-bytes: 10485760
# AI大模型配置
deepseek:
  api-key: sk-de605da0c0fd4f1595733b7cdaf91938
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
server:
  port: 8123
  servlet:
    context-path: /api
spring:
  application:
    name: projectTest
  mvc:
    # 关闭后 multipart 文件上传更稳定（避免 FormContentFilter 与 multipart 解析顺序问题）
    formcontent:
      filter:
        enabled: false
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 15MB
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/qanda
    username: root
    password: 123456
  # ===== 新增Redis配置 =====
  redis:
    # Redis服务器地址（本地填localhost/127.0.0.1，远程填实际IP）
    host: localhost
    # Redis端口（默认6379，若你修改过Redis端口需对应修改）
    port: 6379
    # Redis密码（若你的Redis未设置密码，保留空值即可；设置过则填实际密码）
    password:
    # Redis数据库索引（默认0，无需修改，不同数据库可用于隔离不同业务数据）
    database: 1
    # 连接超时时间（毫秒），避免连接等待过久
    timeout: 10000ms
    # lettuce连接池配置（Spring Boot 2.x默认用lettuce，推荐配置连接池提升性能）
    lettuce:
      pool:
        # 连接池最大活跃连接数（默认8，根据业务调整）
        max-active: 8
        # 连接池最大空闲连接数（默认8）
        max-idle: 8
        # 连接池最小空闲连接数（默认0）
        min-idle: 0
        # 连接池最大等待时间（毫秒），-1表示无限制
        max-wait: -1ms
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    enable-sql-runner: true
    db-config:
      logic-delete-field: is_delete
      logic-delete-value: 1
      logic-not-delete-value: 0
